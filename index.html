<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RedRhino Digital | Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS Variables --- */
        :root {
            --red-brand: #c1121f;
            --red-dark: #3a0005;
            --bg-dark: #050505;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --btn-border: rgba(255, 255, 255, 0.1);
        }

        /* --- Base Reset & Strict Mobile Setup --- */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 50% 30%, var(--red-dark) 10%, var(--bg-dark) 90%);
            color: var(--text-main);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- Background Rhino Image (Scaled Down & Anchored) --- */
        .rhino-bg-image {
            position: fixed;
            bottom: -30px;
            left: -30px;
            width: 65vmin; /* Much smaller base size */
            min-width: 300px;
            max-width: 600px;
            opacity: 0.12;
            transform-origin: bottom left;
            transform: rotate(-15deg);
            z-index: 0;
            pointer-events: none;
            mix-blend-mode: plus-lighter; 
            transition: transform 0.1s ease-out;
        }

        /* --- Main Content Container (Tighter Width) --- */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px; /* Reduced from 480px for a sleeker look */
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Header Section --- */
        .header {
            text-align: center;
            margin-bottom: 25px;
            animation: fadeDown 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .logo {
            width: 70px; /* Scaled down */
            height: 70px;
            background: #fff;
            border-radius: 14px;
            padding: 8px; 
            object-fit: contain;
            margin-bottom: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .title {
            font-size: 20px; /* Scaled down */
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 10px; /* Scaled down */
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 1.2px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        /* --- Links Section --- */
        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px; /* Tighter gap between buttons */
        }

        /* --- Button Styles (Slimmer & More Premium) --- */
        .link-btn {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            height: 52px; /* Slimmer buttons */
            padding: 0 14px;
            background: linear-gradient(90deg, rgba(50, 50, 50, 0.5) 0%, rgba(20, 20, 20, 0.8) 100%);
            border: 1px solid var(--btn-border);
            border-radius: 50px;
            text-decoration: none;
            color: var(--text-main);
            font-size: 11px; /* Scaled down text */
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            overflow: hidden;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease-out;
            opacity: 0;
            transform: translateY(20px);
        }

        /* Staggered Entrance Animations */
        .link-btn:nth-child(1) { animation: slideUp 0.5s forwards 0.1s; }
        .link-btn:nth-child(2) { animation: slideUp 0.5s forwards 0.15s; }
        .link-btn:nth-child(3) { animation: slideUp 0.5s forwards 0.2s; }
        .link-btn:nth-child(4) { animation: slideUp 0.5s forwards 0.25s; }
        .link-btn:nth-child(5) { animation: slideUp 0.5s forwards 0.3s; }

        /* Desktop Hover States */
        @media (hover: hover) and (pointer: fine) {
            .logo:hover {
                transform: scale(1.05);
            }
            .link-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(193, 18, 31, 0.25);
                border-color: rgba(193, 18, 31, 0.4);
                background: linear-gradient(90deg, rgba(70, 25, 25, 0.6) 0%, rgba(30, 20, 20, 0.9) 100%);
            }
            .link-btn:hover .btn-icon {
                transform: scale(1.1);
            }
        }

        /* Mobile Tap Active State */
        .link-btn:active {
            transform: scale(0.97);
            background: linear-gradient(90deg, rgba(70, 25, 25, 0.7) 0%, rgba(20, 20, 20, 0.95) 100%);
            border-color: rgba(193, 18, 31, 0.4);
        }

        /* Button Icon Area (Scaled Down) */
        .icon-wrapper {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .btn-icon {
            width: 16px;
            height: 16px;
            fill: var(--text-main);
            transition: transform 0.3s ease;
        }

        .btn-text {
            flex-grow: 1;
            text-align: center;
            padding-right: 44px; /* Matches new icon wrapper size for perfect center */
        }

        /* Animated Shine Effect Overlay */
        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 60%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.08), transparent);
            transform: skewX(-25deg);
            animation: shineSweep 7s infinite;
            pointer-events: none;
        }
        
        .link-btn:nth-child(even)::before { animation-delay: 3.5s; }

        /* Click Ripple Effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: rippleAnim 0.6s linear;
            background-color: rgba(255, 255, 255, 0.15);
            pointer-events: none;
        }

        /* --- Keyframes --- */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shineSweep {
            0% { left: -100%; opacity: 0; }
            20% { left: 200%; opacity: 1;}
            100% { left: 200%; opacity: 0;}
        }

        @keyframes rippleAnim {
            to { transform: scale(4); opacity: 0; }
        }

        /* --- Smaller Mobile Fallbacks (iPhone SE, older phones) --- */
        @media (max-width: 360px) {
            .container { padding: 25px 15px; }
            .title { font-size: 18px; }
            .subtitle { font-size: 9px; }
            .link-btn { height: 48px; font-size: 10px; }
            .icon-wrapper { width: 28px; height: 28px; }
            .btn-icon { width: 14px; height: 14px; }
            .btn-text { padding-right: 40px; }
        }
    </style>
</head>
<body>

    <img src="image.png" alt="" class="rhino-bg-image" id="parallax-bg">

    <script>
        // JS Ripple Effect
        const buttons = document.querySelectorAll('.link-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', function(e) {
                let rect = e.target.getBoundingClientRect();
                let x = e.clientX - rect.left;
                let y = e.clientY - rect.top;
                
                let ripple = document.createElement('span');
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                ripple.classList.add('ripple');
                
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });

        // Desktop Parallax
        if (window.matchMedia("(pointer: fine)").matches) {
            document.addEventListener('mousemove', (e) => {
                const bg = document.getElementById('parallax-bg');
                const mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
                const mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
                bg.style.transform = `rotate(-15deg) translate(${mouseX * -15}px, ${mouseY * -15}px)`;
            });
        }
    </script>
</body>
</html>
