<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedRhino Digital | Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Variables */
        :root {
            --red-brand: #c1121f;
            --red-dark: #3a0005;
            --bg-dark: #050505;
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
            --btn-bg: rgba(30, 30, 30, 0.6);
            --btn-border: rgba(255, 255, 255, 0.08);
        }

        /* Base Setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 30% 20%, var(--red-dark) 0%, var(--bg-dark) 80%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Abstract Rhino Background Element */
        .bg-rhino-wrapper {
            position: fixed;
            top: 0;
            left: -15%;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 0;
            display: flex;
            align-items: center;
            opacity: 0.04;
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .bg-rhino-wrapper svg {
            width: 120vmin;
            height: 120vmin;
            fill: none;
            stroke: #ff0000;
            stroke-width: 2;
            animation: pulseGlow 8s infinite alternate ease-in-out;
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header Section */
        .header {
            text-align: center;
            margin-bottom: 35px;
            animation: fadeDown 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 22px;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #fff; /* White bg in case logo has transparency */
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05) rotate(-2deg);
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Links Section */
        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Button Styles */
        .link-btn {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            padding: 18px 24px;
            background: linear-gradient(90deg, rgba(45,45,45,0.7) 0%, rgba(20,20,20,0.8) 100%);
            border: 1px solid var(--btn-border);
            border-radius: 50px;
            text-decoration: none;
            color: var(--text-main);
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 1px;
            overflow: hidden;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            opacity: 0;
            transform: translateY(20px);
        }

        /* Staggered Animations */
        .link-btn:nth-child(1) { animation: slideUp 0.6s forwards 0.1s; }
        .link-btn:nth-child(2) { animation: slideUp 0.6s forwards 0.2s; }
        .link-btn:nth-child(3) { animation: slideUp 0.6s forwards 0.3s; }
        .link-btn:nth-child(4) { animation: slideUp 0.6s forwards 0.4s; }
        .link-btn:nth-child(5) { animation: slideUp 0.6s forwards 0.5s; }

        /* Hover States */
        .link-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 25px rgba(193, 18, 31, 0.3);
            border-color: rgba(193, 18, 31, 0.5);
            background: linear-gradient(90deg, rgba(60,20,20,0.8) 0%, rgba(20,20,20,0.9) 100%);
        }

        /* Button Layout Inner */
        .btn-icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
            margin-right: 15px;
            transition: transform 0.3s ease;
            z-index: 2;
        }

        .link-btn:hover .btn-icon {
            transform: scale(1.15) rotate(5deg);
            color: #ff4d4d;
        }

        .btn-text {
            flex-grow: 1;
            text-align: center;
            margin-right: 39px; /* Offsets the icon width to perfectly center text */
            z-index: 2;
        }

        /* Animated Shine Effect */
        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.15), transparent);
            transform: skewX(-25deg);
            animation: shineSweep 7s infinite;
            z-index: 1;
        }
        
        /* Stagger the shine sweeps */
        .link-btn:nth-child(2)::before { animation-delay: 1s; }
        .link-btn:nth-child(3)::before { animation-delay: 2s; }
        .link-btn:nth-child(4)::before { animation-delay: 3s; }
        .link-btn:nth-child(5)::before { animation-delay: 4s; }

        /* Ripple Effect (JS Triggered) */
        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: rippleAnim 0.6s linear;
            background-color: rgba(255, 255, 255, 0.2);
            z-index: 0;
        }

        /* Keyframes */
        @keyframes fadeDown {
            0% { opacity: 0; transform: translateY(-30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes shineSweep {
            0% { left: -150%; }
            15% { left: 200%; }
            100% { left: 200%; }
        }

        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 10px rgba(193,18,31,0.2)); transform: scale(1); }
            100% { filter: drop-shadow(0 0 30px rgba(193,18,31,0.6)); transform: scale(1.02); }
        }

        @keyframes rippleAnim {
            to { transform: scale(4); opacity: 0; }
        }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            .container { padding: 30px 15px; }
            .link-btn { padding: 16px 20px; font-size: 14px; }
            .title { font-size: 24px; }
            .subtitle { font-size: 12px; }
        }
    </style>
</head>
<body>

        </main>
    </div>

    <script>
        // 1. Material-style Ripple Effect on Click
        const buttons = document.querySelectorAll('.link-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', function(e) {
                let x = e.clientX - e.target.getBoundingClientRect().left;
                let y = e.clientY - e.target.getBoundingClientRect().top;
                
                let ripples = document.createElement('span');
                ripples.style.left = x + 'px';
                ripples.style.top = y + 'px';
                ripples.classList.add('ripple');
                
                this.appendChild(ripples);
                setTimeout(() => {
                    ripples.remove();
                }, 600);
            });
        });

        // 2. Subtle Parallax effect on desktop for the Rhino background
        document.addEventListener('mousemove', (e) => {
            const bg = document.getElementById('parallax-bg');
            // Calculate mouse position relative to center of screen
            const mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            const mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
            
            // Move background slightly in opposite direction
            bg.style.transform = `translate(${mouseX * -20}px, ${mouseY * -20}px)`;
        });
    </script>
</body>
</html>
